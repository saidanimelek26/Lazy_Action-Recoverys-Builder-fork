name: Lineage Recovery Builder

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'LineageOS Manifest Branch'
        required: true
        default: 'lineage-21.0'
        type: choice
        options:
        - lineage-21.0
        - lineage-20.0
        - lineage-19.1
      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/oliplusmzr/recovery_device_samsung_a24'
      DEVICE_TREE_BRANCH:
        description: 'Custom Recovery Tree Branch'
        required: true
        default: 'LineageRecovery'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
        - recovery

jobs:
  build:
    name: Build Lineage Recovery by ${{ github.actor }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Check Out
      uses: actions/checkout@v4
      
    - name: Display Inputs
      run: |
        echo "Manifest Branch: ${{ inputs.MANIFEST_BRANCH }}"
        echo "Device Tree: ${{ inputs.DEVICE_TREE }}"
        echo "Device Branch: ${{ inputs.DEVICE_TREE_BRANCH }}"
        echo "Build Target: ${{ inputs.BUILD_TARGET }}"

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Set Lineage Manifest
      run: |
        echo "MANIFEST=https://github.com/LineageOS/android.git" >> $GITHUB_ENV

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt -y install bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libwxgtk3.0-gtk3-dev openjdk-8-jdk python3

    - name: Install Git-Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Repo
      run: |
        mkdir android-recovery
        cd android-recovery
        git config --global user.name "lazycodebuilder"
        git config --global user.email "154446636+lazycodebuilder@users.noreply.github.com"
        repo init --depth=1 -u ${{ env.MANIFEST }} -b ${{ inputs.MANIFEST_BRANCH }}

    - name: Repo Sync
      run: |
        cd android-recovery
        repo sync -j$(nproc --all) --force-sync

    - name: Clone Device Tree
      run: |
        cd android-recovery
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./device_tree
        cd device_tree
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Setup Device Tree
      run: |
        cd android-recovery/device_tree
        
        # Detect device information from makefiles
        DEVICE_MAKEFILE=""
        DEVICE_DIRECTORY=""
        DEVICE_NAME=""
        BRAND=""
        
        # Method 1: Look for AndroidProducts.mk
        if [ -f "AndroidProducts.mk" ]; then
            # Get the main makefile from AndroidProducts.mk
            MAIN_MAKEFILE=$(grep -E 'PRODUCT_MAKEFILES\s*:=' AndroidProducts.mk | head -1 | sed 's/.*:=\s*//' | sed 's/)\s*$//' | xargs | cut -d' ' -f1)
            if [ -n "$MAIN_MAKEFILE" ]; then
                DEVICE_MAKEFILE=$(basename "$MAIN_MAKEFILE" .mk)
            fi
            DEVICE_NAME=$(grep -oP 'PRODUCT_DEVICE[[:space:]]*:=\s*\K\S+' AndroidProducts.mk | head -1)
            BRAND=$(grep -oP 'PRODUCT_BRAND[[:space:]]*:=\s*\K\S+' AndroidProducts.mk | head -1)
        fi
        
        # Method 2: Look in device.mk or similar
        if [ -z "$DEVICE_NAME" ]; then
            for mkfile in *.mk; do
                if [ -f "$mkfile" ] && [ "$mkfile" != "AndroidProducts.mk" ]; then
                    DEVICE_NAME=$(grep -E '^[[:space:]]*PRODUCT_DEVICE[[:space:]]*:=' "$mkfile" | head -1 | sed 's/.*:=[[:space:]]*//' | xargs)
                    BRAND=$(grep -E '^[[:space:]]*PRODUCT_BRAND[[:space:]]*:=' "$mkfile" | head -1 | sed 's/.*:=[[:space:]]*//' | xargs)
                    if [ -n "$DEVICE_NAME" ]; then
                        if [ -z "$DEVICE_MAKEFILE" ]; then
                            DEVICE_MAKEFILE=$(basename "$mkfile" .mk)
                        fi
                        break
                    fi
                fi
            done
        fi
        
        # Fallback: use directory name
        if [ -z "$DEVICE_NAME" ]; then
            DEVICE_NAME=$(basename "$(pwd)" | sed 's/device_//' | sed 's/recovery_//')
            DEVICE_MAKEFILE="$DEVICE_NAME"
            BRAND="samsung"
        fi
        
        # Set default brand if empty
        if [ -z "$BRAND" ]; then
            BRAND="samsung"
        fi
        
        DEVICE_DIRECTORY="device/$BRAND/$DEVICE_NAME"
        
        echo "Detected: DEVICE_NAME=${DEVICE_NAME}"
        echo "Detected: DEVICE_MAKEFILE=${DEVICE_MAKEFILE}"
        echo "Detected: DEVICE_DIRECTORY=${DEVICE_DIRECTORY}"
        echo "Detected: BRAND=${BRAND}"
        
        echo "DEVICE_NAME=${DEVICE_NAME}" >> $GITHUB_ENV
        echo "DEVICE_MAKEFILE=${DEVICE_MAKEFILE}" >> $GITHUB_ENV
        echo "DEVICE_DIRECTORY=${DEVICE_DIRECTORY}" >> $GITHUB_ENV
        echo "BRAND=${BRAND}" >> $GITHUB_ENV
        
        cd ../
        mkdir -p "$DEVICE_DIRECTORY"
        mv device_tree/* "$DEVICE_DIRECTORY"/
        rm -rf device_tree

    - name: Create Roomservice.xml
      run: |
        cd android-recovery
        mkdir -p .repo/local_manifests
        
        cat > .repo/local_manifests/roomservice.xml << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="$(echo ${{ inputs.DEVICE_TREE }} | sed 's|https://github.com/||')" path="${{ env.DEVICE_DIRECTORY }}" remote="github" revision="${{ inputs.DEVICE_TREE_BRANCH }}" />
        </manifest>
        EOF
        
        echo "Roomservice.xml created:"
        cat .repo/local_manifests/roomservice.xml

    - name: Fix Dependencies
      run: |
        cd android-recovery
        
        # Check if device needs additional dependencies
        if [ -f "${{ env.DEVICE_DIRECTORY }}/lineage.dependencies" ]; then
          echo "Found lineage.dependencies, will sync dependencies..."
          # Parse dependencies if needed
        fi
        
        # Create a dummy device configuration if missing
        if [ ! -f "${{ env.DEVICE_DIRECTORY }}/AndroidProducts.mk" ]; then
          echo "Creating AndroidProducts.mk..."
          cat > "${{ env.DEVICE_DIRECTORY }}/AndroidProducts.mk" << EOF
        PRODUCT_MAKEFILES := \\
            \$(LOCAL_DIR)/${{ env.DEVICE_MAKEFILE }}.mk
        EOF
        fi
        
        # Ensure the main device makefile exists
        if [ ! -f "${{ env.DEVICE_DIRECTORY }}/${{ env.DEVICE_MAKEFILE }}.mk" ]; then
          echo "WARNING: Main device makefile not found!"
          echo "Looking for available .mk files..."
          ls -la "${{ env.DEVICE_DIRECTORY }}/"
        fi

    - name: Build Lineage Recovery
      run: |
        cd android-recovery
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export WITH_SU=true
        
        # Try to lunch with full device name
        if ! lunch lineage_${{ env.DEVICE_NAME }}-eng 2>/dev/null; then
            if ! lunch ${{ env.DEVICE_NAME }}-eng 2>/dev/null; then
                if ! lunch ${{ env.DEVICE_MAKEFILE }}-eng 2>/dev/null; then
                    echo "All lunch attempts failed!"
                    echo "Available lunch targets:"
                    lunch
                    exit 1
                fi
            fi
        fi
        
        make clean
        make ${{ inputs.BUILD_TARGET }}image -j$(nproc --all)

    - name: Set Build Date
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android-recovery/out/target/product/${{ env.DEVICE_NAME }}/${{ inputs.BUILD_TARGET }}.img
        name: Unofficial Lineage Recovery for ${{ env.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest: ${{ inputs.MANIFEST_BRANCH }}
          Tree: [Device Tree](${{ inputs.DEVICE_TREE }}/tree/${{ inputs.DEVICE_TREE_BRANCH }})
          Commit: [${{ env.COMMIT_ID }}](${{ inputs.DEVICE_TREE }}/commit/${{ env.COMMIT_ID }})
          
          **Device Information:**
          - Device: ${{ env.DEVICE_NAME }}
          - Brand: ${{ env.BRAND }}
          - Makefile: ${{ env.DEVICE_MAKEFILE }}
