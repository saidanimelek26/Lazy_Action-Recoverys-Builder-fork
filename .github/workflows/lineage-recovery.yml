name: Lineage Recovery Builder

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'LineageOS Manifest Branch'
        required: true
        default: 'lineage-21.0'
        type: choice
        options:
        - lineage-21.0
        - lineage-20.0
        - lineage-19.1
      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/saidanimelek26/twrp_device_samsung_a22-5G'
      DEVICE_TREE_BRANCH:
        description: 'Custom Recovery Tree Branch'
        required: true
        default: 'los-tree'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
        - recovery

jobs:
  build:
    name: Build Lineage Recovery by ${{ github.actor }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Check Out
      uses: actions/checkout@v4
      
    - name: Display Inputs
      run: |
        echo "Manifest Branch: ${{ inputs.MANIFEST_BRANCH }}"
        echo "Device Tree: ${{ inputs.DEVICE_TREE }}"
        echo "Device Branch: ${{ inputs.DEVICE_TREE_BRANCH }}"
        echo "Build Target: ${{ inputs.BUILD_TARGET }}"

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Set Lineage Manifest
      run: |
        echo "MANIFEST=https://github.com/LineageOS/android.git" >> $GITHUB_ENV

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt -y install bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libwxgtk3.0-gtk3-dev openjdk-8-jdk python3

    - name: Install Git-Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Repo
      run: |
        mkdir android-recovery
        cd android-recovery
        git config --global user.name "lazycodebuilder"
        git config --global user.email "154446636+lazycodebuilder@users.noreply.github.com"
        repo init --depth=1 -u ${{ env.MANIFEST }} -b ${{ inputs.MANIFEST_BRANCH }}

    - name: Repo Sync
      run: |
        cd android-recovery
        repo sync -j$(nproc --all) --force-sync

    - name: Clone Device Tree
      run: |
        cd android-recovery
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./device_tree
        cd device_tree
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV
        echo "DEVICE_NAME=a22x" >> $GITHUB_ENV
        echo "BRAND=samsung" >> $GITHUB_ENV

    - name: Setup Device Tree
      run: |
        cd android-recovery
        
        DEVICE_NAME="a22x"
        BRAND="samsung"
        DEVICE_DIRECTORY="device/$BRAND/$DEVICE_NAME"
        
        echo "Using DEVICE_NAME=${DEVICE_NAME}"
        echo "Using DEVICE_DIRECTORY=${DEVICE_DIRECTORY}"
        
        mkdir -p "$DEVICE_DIRECTORY"
        cp -r device_tree/* "$DEVICE_DIRECTORY"/
        rm -rf device_tree

    - name: Fix BoardConfig.mk
      run: |
        cd android-recovery
        
        BOARD_CONFIG="device/samsung/a22x/BoardConfig.mk"
        
        if [ -f "$BOARD_CONFIG" ]; then
            echo "Fixing BoardConfig.mk..."
            sed -i 's/^PLATFORM_SECURITY_PATCH/#PLATFORM_SECURITY_PATCH/g' "$BOARD_CONFIG"
            sed -i 's/^PLATFORM_VERSION/#PLATFORM_VERSION/g' "$BOARD_CONFIG"
            sed -i 's/^TARGET_RELEASED/#TARGET_RELEASED/g' "$BOARD_CONFIG"
            
            if ! grep -q "TARGET_NO_RECOVERY" "$BOARD_CONFIG"; then
                echo "" >> "$BOARD_CONFIG"
                echo "# Recovery flags" >> "$BOARD_CONFIG"
                echo "TARGET_NO_RECOVERY := true" >> "$BOARD_CONFIG"
                echo "BOARD_USES_RECOVERY_AS_BOOT := true" >> "$BOARD_CONFIG"
                echo "BOARD_SUPPRESS_SECURE_ERASE := true" >> "$BOARD_CONFIG"
            fi
            
            echo "BoardConfig.mk fixed"
        fi

    - name: Update AndroidProducts.mk
      run: |
        cd android-recovery
        
        ANDROID_PRODUCTS="device/samsung/a22x/AndroidProducts.mk"
        
        cat > "$ANDROID_PRODUCTS" << EOF
#
# Copyright (C) 2020 The Android Open Source Project
#
# Licensed under the Apache License, Version 2.0 (the "License");
# you may not use this file except in compliance with the License.
# You may obtain a copy of the License at
#
# http://www.apache.org/licenses/LICENSE-2.0
#
# Unless required by applicable law or agreed to in writing, software
# distributed under the License is distributed on an "AS IS" BASIS,
# WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
# See the License for the specific language governing permissions and
# limitations under the License.
#

PRODUCT_MAKEFILES := \\
    \$(LOCAL_DIR)/lineage_a22x.mk

COMMON_LUNCH_CHOICES := \\
    lineage_a22x-user \\
    lineage_a22x-userdebug \\
    lineage_a22x-eng
EOF
        
        echo "Updated AndroidProducts.mk"

    - name: Create lineage_a22x.mk
      run: |
        cd android-recovery
        
        DEVICE_MK="device/samsung/a22x/lineage_a22x.mk"
        
        cat > "$DEVICE_MK" << EOF
# Inherit from device makefile
\$(call inherit-product, device/samsung/a22x/device.mk)

# Inherit common Lineage stuff
\$(call inherit-product, vendor/lineage/config/common_full_phone.mk)

# Device identifier
PRODUCT_NAME := lineage_a22x
PRODUCT_DEVICE := a22x
PRODUCT_BRAND := samsung
PRODUCT_MODEL := SM-A226B
PRODUCT_MANUFACTURER := samsung

PRODUCT_GMS_CLIENTID_BASE := android-samsung
EOF
        
        echo "Created lineage_a22x.mk"

    - name: Build Lineage Recovery
      run: |
        cd android-recovery
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        
        echo "Building for lineage_a22x-eng"
        lunch lineage_a22x-eng
        
        make clean
        make recoveryimage -j$(nproc --all)

    - name: Set Build Date
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

    - name: Find Recovery Image
      run: |
        cd android-recovery
        
        RECOVERY_PATH=""
        if [ -f "out/target/product/a22x/recovery.img" ]; then
            RECOVERY_PATH="out/target/product/a22x/recovery.img"
        elif [ -f "out/target/product/samsung_a22/recovery.img" ]; then
            RECOVERY_PATH="out/target/product/samsung_a22/recovery.img"
        else
            RECOVERY_PATH=$(find out/target/product -name "recovery.img" -type f 2>/dev/null | head -1)
        fi
        
        if [ -n "$RECOVERY_PATH" ] && [ -f "$RECOVERY_PATH" ]; then
            echo "RECOVERY_PATH=${RECOVERY_PATH}" >> $GITHUB_ENV
            echo "Found recovery at: ${RECOVERY_PATH}"
            ls -lh "$RECOVERY_PATH"
        else
            echo "ERROR: Recovery image not found!"
            find out/target -name "*.img" -type f 2>/dev/null || echo "No img files found"
            exit 1
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android-recovery/${{ env.RECOVERY_PATH }}
        name: Lineage Recovery for Samsung A22x (${{ env.BUILD_DATE }})
        tag_name: recovery_a22x_${{ github.run_id }}
        body: |
          ## Lineage Recovery for Samsung Galaxy A22 5G
          
          **Device:** Samsung Galaxy A22 5G (a22x)
          **Branch:** ${{ inputs.MANIFEST_BRANCH }}
          **Build Date:** ${{ env.BUILD_DATE }}
          
          **Source Code:**
          - Device Tree: [${{ inputs.DEVICE_TREE }}](${{ inputs.DEVICE_TREE }})
          - Branch: ${{ inputs.DEVICE_TREE_BRANCH }}
          - Commit: ${{ env.COMMIT_ID }}
          
          **Installation:**
          fastboot flash recovery recovery.img
          
          **Note:** Unofficial build - Use at your own risk
