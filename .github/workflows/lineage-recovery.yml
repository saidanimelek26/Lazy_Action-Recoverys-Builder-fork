name: Lineage Recovery Builder

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'LineageOS Manifest Branch'
        required: true
        default: 'lineage-21.0'
        type: choice
        options:
        - lineage-21.0
        - lineage-20.0
        - lineage-19.1
      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/saidanimelek26/twrp_device_samsung_a22-5G'
      DEVICE_TREE_BRANCH:
        description: 'Custom Recovery Tree Branch'
        required: true
        default: 'los-tree'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
        - recovery

jobs:
  build:
    name: Build Lineage Recovery by ${{ github.actor }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Check Out
      uses: actions/checkout@v4
      
    - name: Display Inputs
      run: |
        echo "Manifest Branch: ${{ inputs.MANIFEST_BRANCH }}"
        echo "Device Tree: ${{ inputs.DEVICE_TREE }}"
        echo "Device Branch: ${{ inputs.DEVICE_TREE_BRANCH }}"
        echo "Build Target: ${{ inputs.BUILD_TARGET }}"

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Set Lineage Manifest
      run: |
        echo "MANIFEST=https://github.com/LineageOS/android.git" >> $GITHUB_ENV

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt -y install bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libwxgtk3.0-gtk3-dev openjdk-8-jdk python3

    - name: Install Git-Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Repo
      run: |
        mkdir android-recovery
        cd android-recovery
        git config --global user.name "lazycodebuilder"
        git config --global user.email "154446636+lazycodebuilder@users.noreply.github.com"
        repo init --depth=1 -u ${{ env.MANIFEST }} -b ${{ inputs.MANIFEST_BRANCH }}

    - name: Repo Sync
      run: |
        cd android-recovery
        repo sync -j$(nproc --all) --force-sync

    - name: Clone Device Tree
      run: |
        cd android-recovery
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./device_tree
        cd device_tree
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV
        DEVICE_NAME_FALLBACK=$(basename "${{ inputs.DEVICE_TREE }}" | sed 's/twrp_device_//' | sed 's/recovery_device_//' | sed 's/device_//')
        echo "DEVICE_NAME_FALLBACK=${DEVICE_NAME_FALLBACK}" >> $GITHUB_ENV

    - name: Setup Device Tree
      run: |
        cd android-recovery/device_tree
        
        DEVICE_NAME=""
        BRAND="samsung"
        
        if [ -f "device.mk" ]; then
            DEVICE_NAME=$(grep -E '^[[:space:]]*PRODUCT_DEVICE[[:space:]]*:=' device.mk | head -1 | sed 's/.*:=[[:space:]]*//' | xargs)
        fi
        
        if [ -z "$DEVICE_NAME" ] && [ -f "AndroidProducts.mk" ]; then
            DEVICE_NAME=$(grep -E 'PRODUCT_DEVICE' AndroidProducts.mk | head -1 | sed 's/.*:=[[:space:]]*//' | xargs)
        fi
        
        if [ -z "$DEVICE_NAME" ]; then
            DEVICE_NAME="${{ env.DEVICE_NAME_FALLBACK }}"
        fi
        
        DEVICE_NAME=$(echo "$DEVICE_NAME" | sed 's/^lineage_//')
        DEVICE_DIRECTORY="device/$BRAND/$DEVICE_NAME"
        
        echo "Detected: DEVICE_NAME=${DEVICE_NAME}"
        echo "Detected: DEVICE_DIRECTORY=${DEVICE_DIRECTORY}"
        
        echo "DEVICE_NAME=${DEVICE_NAME}" >> $GITHUB_ENV
        echo "DEVICE_DIRECTORY=${DEVICE_DIRECTORY}" >> $GITHUB_ENV
        echo "BRAND=${BRAND}" >> $GITHUB_ENV
        
        cd ../
        mkdir -p "$DEVICE_DIRECTORY"
        cp -r device_tree/* "$DEVICE_DIRECTORY"/
        rm -rf device_tree

    - name: Fix BoardConfig.mk
      run: |
        cd android-recovery
        
        BOARD_CONFIG="${{ env.DEVICE_DIRECTORY }}/BoardConfig.mk"
        
        if [ -f "$BOARD_CONFIG" ]; then
            echo "Original BoardConfig.mk:"
            grep -E "PLATFORM_SECURITY_PATCH|PLATFORM_VERSION|TARGET_RELEASED" "$BOARD_CONFIG" || echo "No problematic lines found"
            
            sed -i 's/^\(PLATFORM_SECURITY_PATH\s*:=\)/#\1/' "$BOARD_CONFIG"
            sed -i 's/^\(PLATFORM_VERSION\s*:=\)/#\1/' "$BOARD_CONFIG"
            sed -i 's/^\(TARGET_RELEASED\s*:=\)/#\1/' "$BOARD_CONFIG"
            
            cat >> "$BOARD_CONFIG" << 'EOF'

# Recovery flags
TARGET_NO_RECOVERY := true
BOARD_USES_RECOVERY_AS_BOOT := true
BOARD_SUPPRESS_SECURE_ERASE := true
TW_NO_LEGACY_PROPS := true
EOF
            echo "BoardConfig.mk fixed"
        else
            echo "Warning: BoardConfig.mk not found"
        fi

    - name: Create Device Makefiles
      run: |
        cd android-recovery
        
        cat > "${{ env.DEVICE_DIRECTORY }}/AndroidProducts.mk" << EOF
PRODUCT_MAKEFILES := \\
    \$(LOCAL_DIR)/lineage_${{ env.DEVICE_NAME }}.mk
EOF
        
        cat > "${{ env.DEVICE_DIRECTORY }}/lineage_${{ env.DEVICE_NAME }}.mk" << EOF
# Inherit from device makefile
\$(call inherit-product, device/${{ env.BRAND }}/${{ env.DEVICE_NAME }}/device.mk)

# Inherit common Lineage stuff
\$(call inherit-product, vendor/lineage/config/common_full_phone.mk)

# Device identifier
PRODUCT_NAME := lineage_${{ env.DEVICE_NAME }}
PRODUCT_DEVICE := ${{ env.DEVICE_NAME }}
PRODUCT_BRAND := ${{ env.BRAND }}
PRODUCT_MODEL := ${{ env.DEVICE_NAME }}
PRODUCT_MANUFACTURER := ${{ env.BRAND }}

PRODUCT_GMS_CLIENTID_BASE := android-${{ env.BRAND }}
EOF
        
        echo "Created makefiles for ${{ env.DEVICE_NAME }}"
        ls -la "${{ env.DEVICE_DIRECTORY }}/"

    - name: Create Roomservice.xml
      run: |
        cd android-recovery
        mkdir -p .repo/local_manifests
        
        REPO_NAME=$(echo "${{ inputs.DEVICE_TREE }}" | sed 's|https://github.com/||')
        
        cat > .repo/local_manifests/roomservice.xml << EOF
<?xml version="1.0" encoding="UTF-8"?>
<manifest>
  <project name="${REPO_NAME}" path="${{ env.DEVICE_DIRECTORY }}" remote="github" revision="${{ inputs.DEVICE_TREE_BRANCH }}" />
</manifest>
EOF
        
        echo "Roomservice.xml created"
        cat .repo/local_manifests/roomservice.xml

    - name: Build Lineage Recovery
      run: |
        cd android-recovery
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        
        add_lunch_combo lineage_${{ env.DEVICE_NAME }}-eng
        lunch lineage_${{ env.DEVICE_NAME }}-eng
        
        make clean
        make recoveryimage -j$(nproc --all)

    - name: Set Build Date
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

    - name: Find Recovery Image
      run: |
        cd android-recovery
        
        RECOVERY_PATH=$(find out/target/product/${{ env.DEVICE_NAME }} -name "recovery.img" -type f 2>/dev/null | head -1)
        
        if [ -z "$RECOVERY_PATH" ]; then
            RECOVERY_PATH=$(find out/target/product -name "recovery.img" -type f 2>/dev/null | head -1)
        fi
        
        if [ -n "$RECOVERY_PATH" ] && [ -f "$RECOVERY_PATH" ]; then
            echo "RECOVERY_PATH=${RECOVERY_PATH}" >> $GITHUB_ENV
            echo "Found recovery at: ${RECOVERY_PATH}"
            ls -lh "$RECOVERY_PATH"
        else
            echo "ERROR: Recovery image not found!"
            echo "Build output contents:"
            find out/target -type f -name "*.img" 2>/dev/null || echo "No img files found"
            exit 1
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android-recovery/${{ env.RECOVERY_PATH }}
        name: Lineage Recovery for ${{ env.DEVICE_NAME }} [${{ env.BUILD_DATE }}]
        tag_name: recovery_${{ github.run_id }}
        body: |
          ## Lineage Recovery Build
          
          **Device:** ${{ env.DEVICE_NAME }}
          **Branch:** ${{ inputs.MANIFEST_BRANCH }}
          **Build Date:** ${{ env.BUILD_DATE }}
          
          **Source Code:**
          - Device Tree: [${{ inputs.DEVICE_TREE }}](${{ inputs.DEVICE_TREE }})
          - Branch: ${{ inputs.DEVICE_TREE_BRANCH }}
          - Commit: `${{ env.COMMIT_ID }}`
          
          **Installation:**
