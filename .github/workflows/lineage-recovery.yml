name: Lineage Recovery Builder

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'LineageOS Manifest Branch'
        required: true
        default: 'lineage-21.0'
        type: choice
        options:
        - lineage-21.0
        - lineage-20.0
        - lineage-19.1
      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/saidanimelek26/twrp_device_samsung_a22-5G'
      DEVICE_TREE_BRANCH:
        description: 'Custom Recovery Tree Branch'
        required: true
        default: 'los-tree'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
        - recovery

jobs:
  build:
    name: Build Lineage Recovery by ${{ github.actor }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Check Out
      uses: actions/checkout@v4
      
    - name: Display Inputs
      run: |
        echo "Manifest Branch: ${{ inputs.MANIFEST_BRANCH }}"
        echo "Device Tree: ${{ inputs.DEVICE_TREE }}"
        echo "Device Branch: ${{ inputs.DEVICE_TREE_BRANCH }}"
        echo "Build Target: ${{ inputs.BUILD_TARGET }}"

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Set Lineage Manifest
      run: |
        echo "MANIFEST=https://github.com/LineageOS/android.git" >> $GITHUB_ENV

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt -y install bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libwxgtk3.0-gtk3-dev openjdk-8-jdk python3

    - name: Install Git-Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Repo
      run: |
        mkdir android-recovery
        cd android-recovery
        git config --global user.name "lazycodebuilder"
        git config --global user.email "154446636+lazycodebuilder@users.noreply.github.com"
        repo init --depth=1 -u ${{ env.MANIFEST }} -b ${{ inputs.MANIFEST_BRANCH }}

    - name: Repo Sync
      run: |
        cd android-recovery
        repo sync -j$(nproc --all) --force-sync

    - name: Clone Device Tree
      run: |
        cd android-recovery
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./device_tree
        cd device_tree
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV
        echo "DEVICE_NAME=a22x" >> $GITHUB_ENV
        echo "BRAND=samsung" >> $GITHUB_ENV

    - name: Setup Device Tree
      run: |
        cd android-recovery
        mkdir -p device/samsung/a22x
        cp -r device_tree/* device/samsung/a22x/
        rm -rf device_tree

    - name: Fix BoardConfig.mk (Remove problematic lines only)
      run: |
        cd android-recovery
        # Comment out problematic lines in BoardConfig.mk
        sed -i 's/^PLATFORM_SECURITY_PATCH/#PLATFORM_SECURITY_PATCH/g' device/samsung/a22x/BoardConfig.mk || true
        sed -i 's/^PLATFORM_VERSION/#PLATFORM_VERSION/g' device/samsung/a22x/BoardConfig.mk || true
        sed -i 's/^TARGET_RELEASED/#TARGET_RELEASED/g' device/samsung/a22x/BoardConfig.mk || true
        
        # Remove any existing recovery flags to prevent conflicts
        sed -i '/TARGET_NO_RECOVERY/d' device/samsung/a22x/BoardConfig.mk
        sed -i '/BOARD_USES_RECOVERY_AS_BOOT/d' device/samsung/a22x/BoardConfig.mk
        
        # DO NOT add wrong flags - let the existing BoardConfig.mk keep its correct values

    - name: Update AndroidProducts.mk
      run: |
        cd android-recovery
        echo "PRODUCT_MAKEFILES := \$(LOCAL_DIR)/lineage_a22x.mk" > device/samsung/a22x/AndroidProducts.mk
        echo "COMMON_LUNCH_CHOICES := lineage_a22x-user lineage_a22x-userdebug lineage_a22x-eng" >> device/samsung/a22x/AndroidProducts.mk

    - name: Create lineage_a22x.mk
      run: |
        cd android-recovery
        echo "# Inherit from device makefile" > device/samsung/a22x/lineage_a22x.mk
        echo "\$(call inherit-product, device/samsung/a22x/device.mk)" >> device/samsung/a22x/lineage_a22x.mk
        echo "" >> device/samsung/a22x/lineage_a22x.mk
        echo "# Inherit common Lineage stuff" >> device/samsung/a22x/lineage_a22x.mk
        echo "\$(call inherit-product, vendor/lineage/config/common_full_phone.mk)" >> device/samsung/a22x/lineage_a22x.mk
        echo "" >> device/samsung/a22x/lineage_a22x.mk
        echo "# Device identifier" >> device/samsung/a22x/lineage_a22x.mk
        echo "PRODUCT_NAME := lineage_a22x" >> device/samsung/a22x/lineage_a22x.mk
        echo "PRODUCT_DEVICE := a22x" >> device/samsung/a22x/lineage_a22x.mk
        echo "PRODUCT_BRAND := samsung" >> device/samsung/a22x/lineage_a22x.mk
        echo "PRODUCT_MODEL := SM-A226B" >> device/samsung/a22x/lineage_a22x.mk
        echo "PRODUCT_MANUFACTURER := samsung" >> device/samsung/a22x/lineage_a22x.mk
        echo "" >> device/samsung/a22x/lineage_a22x.mk
        echo "PRODUCT_GMS_CLIENTID_BASE := android-samsung" >> device/samsung/a22x/lineage_a22x.mk

    - name: Build Lineage Recovery
      run: |
        cd android-recovery
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch lineage_a22x-eng
        make clean
        make recoveryimage -j$(nproc --all)

    - name: Set Build Date
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

    - name: Find Recovery Image
      run: |
        cd android-recovery
        if [ -f "out/target/product/a22x/recovery.img" ]; then
          echo "RECOVERY_PATH=out/target/product/a22x/recovery.img" >> $GITHUB_ENV
          ls -lh out/target/product/a22x/recovery.img
        else
          echo "ERROR: Recovery image not found!"
          echo "Listing all img files:"
          find out/target -name "*.img" 2>/dev/null || echo "No img files found"
          echo ""
          echo "Listing out/target/product/a22x directory:"
          ls -la out/target/product/a22x/ 2>/dev/null || echo "Directory not found"
          exit 1
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android-recovery/${{ env.RECOVERY_PATH }}
        name: Lineage Recovery for Samsung A22x (${{ env.BUILD_DATE }})
        tag_name: recovery_a22x_${{ github.run_id }}
        body: |
          Lineage Recovery for Samsung Galaxy A22 5G
          
          Device: Samsung Galaxy A22 5G (a22x)
          Branch: ${{ inputs.MANIFEST_BRANCH }}
          Build Date: ${{ env.BUILD_DATE }}
          
          Installation: 
          - fastboot flash recovery recovery.img
          - Or use Odin with tar file
          
          Note: Unofficial build - Use at your own risk
